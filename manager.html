<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Simple Bookmarks Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="manager.css">
</head>
<body>
  <header class="toolbar">
    <button id="back" title="Back" disabled>←</button>
    <button id="forward" title="Forward" disabled>→</button>
    <button id="new-folder">New Folder</button>
    <button id="new-bookmark">New Bookmark</button>
    <input id="search" type="search" placeholder="Search bookmarks">
    <strong class="app-title">Simple Bookmarks Manager</strong>
    <button id="app-menu-button" class="app-menu-button" type="button" title="Open menu" aria-haspopup="menu" aria-expanded="false" aria-label="Open Simple Bookmarks Manager menu">☰</button>
  </header>

  <main id="layout" class="layout">
    <nav class="left">
      <h2>Library</h2>
      <div id="roots" class="tree"></div>
    </nav>

    <section class="content">
      <div id="crumbs" class="crumbs">
        <label class="visual-sort-label" for="sort">Visual sort:</label>
        <select id="sort" title="Choose the middle-pane sort mode. Default uses Chromium’s folder order.">
          <option value="index">Default</option>
          <option value="title">Name</option>
          <option value="url">URL</option>
          <option value="dateAdded">Date added</option>
          <option value="id">ID</option>
        </select>
      </div>
      <div id="table-scroll" class="table-scroll">
        <div class="table-content">
          <div class="columns" aria-label="Bookmark list columns">
            <button type="button" data-sort-key="title">Name</button>
            <button type="button" data-sort-key="url">URL</button>
            <button type="button" data-sort-key="dateAdded">Date Added</button>
            <button type="button" data-sort-key="id">ID</button>
            <button type="button" data-sort-key="index">Order</button>
          </div>
          <div id="list" class="list" tabindex="0" aria-label="Bookmarks"></div>
        </div>
      </div>
    </section>

    <aside id="details-pane" class="details">
      <h2>Details</h2>
      <form id="details-form">
        <label id="title-label"><span class="field-caption">Name</span><input id="title" autocomplete="off"></label>
        <label id="url-label"><span class="field-caption">URL</span><input id="url" autocomplete="off"></label>
        <label id="parent-label"><span class="field-caption">Parent folder</span><select id="parent"></select></label>
        <div class="row details-actions">
          <button id="save" type="submit">Save</button>
          <button id="discard" type="button">Discard Changes</button>
          <button id="delete" type="button">Delete</button>
        </div>
        <div class="advanced-debug-controls" aria-label="Advanced details debug controls">
          <label><input id="advanced-viewing-toggle" type="checkbox"> EnableAdvancedDetailsViewing</label>
          <label><input id="advanced-editing-toggle" type="checkbox"> EnableAdvancedDetailsEditing</label>
          <label><input id="sort-by-name-natural-toggle" type="checkbox"> SortByNameNatural</label>
          <label><input id="sort-show-warning-toggle" type="checkbox"> SortShowWarning</label>
          <label><input id="delete-show-warning-toggle" type="checkbox"> DeleteShowWarning</label>
        </div>
        <section id="advanced-details" class="advanced-details" aria-label="Advanced bookmark details">
          <h3>Advanced Details</h3>
          <label id="advanced-id-label"><span class="field-caption">ID</span><input id="advanced-id" autocomplete="off" readonly></label>
          <label id="advanced-guid-label"><span class="field-caption">GUID / UUID</span><input id="advanced-guid" autocomplete="off" readonly></label>
          <label id="advanced-date-added-label"><span class="field-caption">Date Added</span><input id="advanced-date-added" autocomplete="off" readonly></label>
          <label id="advanced-date-last-used-label"><span class="field-caption">Date Last Used</span><input id="advanced-date-last-used" autocomplete="off" readonly></label>
          <label id="advanced-index-label"><span class="field-caption">Sort order</span><input id="advanced-index" type="number" min="0" step="1" autocomplete="off" readonly></label>
        </section>
      </form>
      <p id="empty-details">Select one item, or select a folder to show its contents.</p>
    </aside>
  </main>

  <script type="module" src="manager.js"></script>
</body>
</html>
