<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title data-i18n="optionsTitle">Simple Bookmarks Manager Options</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="options-page">
    <header>
      <h1 data-i18n="optionsTitle">Simple Bookmarks Manager Options</h1>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </header>

    <section class="option-section">
      <h2 data-i18n="userInterface">User Interface</h2>
      
      <label class="option-row option-row-control">
        <span>
          <strong data-i18n="userInterfaceLanguage">User Interface Language</strong>
          <small data-i18n="userInterfaceLanguageHelp">Automatic follows the browser UI language. Manual choices affect the manager and options pages.</small>
        </span>
        <select id="UserInterfaceLanguage"></select>
      </label>
      <label class="option-row option-row-control">
        <span>
          <strong data-i18n="font">Font</strong>
          <small data-i18n="fontHelp">Controls the main font family used by the bookmark manager UI.</small>
        </span>
        <select id="UserInterfaceFontFamily">
          <option value="system" style="font-family: system-ui, sans-serif;" data-i18n="fontSystem">System default</option>
          <option value="sans" style="font-family: Arial, Helvetica, sans-serif;" data-i18n="fontSans">Arial / Helvetica</option>
          <option value="serif" style="font-family: Georgia, 'Times New Roman', serif;" data-i18n="fontSerif">Georgia / Times</option>
          <option value="mono" style="font-family: Consolas, 'Cascadia Mono', 'Courier New', monospace;" data-i18n="fontMono">Consolas / monospace</option>
        </select>
      </label>
      <label class="option-row option-row-control">
        <span>
          <strong data-i18n="fontSize">Font size</strong>
          <small data-i18n="fontSizeHelp">Base text size. Headings and column labels scale relative to this value.</small>
        </span>
        <input id="UserInterfaceFontSize" type="number" min="11" max="20" step="0.5">
      </label>
      <label class="option-row option-row-control">
        <span>
          <strong data-i18n="fontSpacing">Font spacing</strong>
          <small data-i18n="fontSpacingHelp">Line spacing multiplier for denser or more readable rows and labels.</small>
        </span>
        <input id="UserInterfaceLineSpacing" type="number" min="1" max="1.8" step="0.05">
      </label>
    </section>

    <section class="option-section">
      <h2 data-i18n="search">Search</h2>
      <label class="option-row">
        <input id="SearchLimitToFolderAndSub" type="checkbox">
        <span>
          <strong data-i18n="searchLimitFull">Limit Search to Current Folder &amp; Subfolders</strong>
          <small data-i18n="searchLimitOptionHelp">When enabled, the main search box searches only inside the current visible folder tree.</small>
        </span>
      </label>
    </section>

    <section class="option-section">
      <h2 data-i18n="safety">Safety</h2>
      <label class="option-row">
        <input id="DeleteShowWarning" type="checkbox">
        <span>
          <strong data-i18n="showDeleteWarning">Show delete confirmation warning</strong>
          <small data-i18n="showDeleteWarningHelp">Ask before deleting bookmark items or folders.</small>
        </span>
      </label>
      <label class="option-row">
        <input id="SortShowWarning" type="checkbox">
        <span>
          <strong data-i18n="showSortWarning">Show permanent sort confirmation warning</strong>
          <small data-i18n="showSortWarningHelp">Ask before applying context-menu sorts that permanently reorder a bookmark folder.</small>
        </span>
      </label>
      <label class="option-row">
        <input id="KeyboardDeleteAllow" type="checkbox">
        <span>
          <strong data-i18n="allowKeyboardDelete">Allow Delete key to delete selected items</strong>
          <small data-i18n="allowKeyboardDeleteHelp">When disabled, the Delete key no longer deletes selected bookmark entries.</small>
        </span>
      </label>
    </section>

    <section class="option-section">
      <h2 data-i18n="sorting">Sorting</h2>
      <label class="option-row">
        <input id="SortByNameNatural" type="checkbox">
        <span>
          <strong data-i18n="naturalSort">Use natural folder/bookmark sort order</strong>
          <small data-i18n="naturalSortHelp">Permanent Sort by Name places folders first, separators next, then bookmarks.</small>
        </span>
      </label>
    </section>

    <section class="option-section">
      <h2 data-i18n="advanced">Advanced</h2>
      <label class="option-row">
        <input id="EnableAdvancedDetailsViewing" type="checkbox">
        <span>
          <strong data-i18n="enableAdvancedViewing">Enable advanced details viewing</strong>
          <small data-i18n="enableAdvancedViewingHelp">Show read-only advanced bookmark metadata in the Details pane.</small>
        </span>
      </label>
      <label class="option-row">
        <input id="EnableAdvancedDetailsEditing" type="checkbox">
        <span>
          <strong data-i18n="enableAdvancedEditing">Enable advanced details editing</strong>
          <small data-i18n="enableAdvancedEditingHelp">Allow supported advanced editing, currently limited to bookmark index changes.</small>
        </span>
      </label>
      <label class="option-row">
        <input id="Optimisation_DOMrendering" type="checkbox">
        <span>
          <strong data-i18n="optimisationDOMrendering">Optimisation: DOM rendering pass</strong>
          <small data-i18n="optimisationDOMrenderingHelp">Experimental. Enables reduced DOM churn for selected rendering, drag/drop indicators, and row icon handling. Disable only when comparing performance or troubleshooting UI behavior.</small>
        </span>
      </label>
      <label class="option-row">
        <input id="Optimisation_TempBookmarkTreeMaps" type="checkbox">
        <span>
          <strong data-i18n="optimisationTempBookmarkTreeMaps">Optimisation: temporary bookmark tree maps</strong>
          <small data-i18n="optimisationTempBookmarkTreeMapsHelp">Experimental. Builds short-lived lookup maps during some render/search/tree operations, then discards them to avoid a persistent stale cache.</small>
        </span>
      </label>
      <label class="option-row">
        <input id="Show_ErrorsWarnings" type="checkbox">
        <span>
          <strong data-i18n="showErrorsWarnings">Show warnings/errors log</strong>
          <small data-i18n="showErrorsWarningsHelp">Advanced. Shows a transient in-memory log for this SBM session. Log entries are not saved to extension settings.</small>
        </span>
      </label>
      <label class="option-row">
        <input id="DebugOptions" type="checkbox">
        <span>
          <strong data-i18n="debugOptions">Debug options</strong>
          <small data-i18n="debugOptionsHelp">Advanced. Shows debug-only test controls. Leave disabled during normal use.</small>
        </span>
      </label>
    </section>

    <div class="actions">
      <button id="reset" type="button" data-i18n="resetDefaults">Reset to Defaults</button>
      <button id="debug-failed-bookmark-operation" type="button" data-i18n="debugFailedBookmarkOperation" hidden>Debug: cause failed bookmark operation</button>
    </div>

    <section id="warnings-errors-log-section" class="option-section warnings-errors-log-section" hidden>
      <h2 data-i18n="warningsErrorsLog">Warnings / Errors Log</h2>
      <p class="log-help" data-i18n="warningsErrorsLogHelp">Transient warnings/errors for this current SBM session. This is not saved to settings.</p>
      <textarea id="warnings-errors-log" class="warnings-errors-log" readonly spellcheck="false"></textarea>
      <div class="actions">
        <button id="clear-warnings-errors-log" type="button" data-i18n="clearLog">Clear Log</button>
      </div>
    </section>
  </main>

  <script type="module" src="options.js"></script>
</body>
</html>
